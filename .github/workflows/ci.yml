name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmupdf-dev ffmpeg unzip zip tar
        sudo apt-get install -y libheif-examples
        sudo apt-get install -y libreoffice-core libreoffice-writer libreoffice-calc libreoffice-impress

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test ./internal/... ./cmd/... -v

    - name: Run tests with race detector
      run: go test -race ./internal/... ./cmd/...

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
