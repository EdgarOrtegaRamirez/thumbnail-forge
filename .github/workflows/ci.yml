name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmupdf-dev ffmpeg unzip zip tar
        sudo apt-get install -y libreoffice-core libreoffice-writer libreoffice-calc libreoffice-impress

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test ./internal/... ./cmd/... -v

    - name: Run tests with race detector
      run: go test -race ./internal/... ./cmd/...

    - name: Generate benchmark fixtures
      run: python3 generate_bench_fixtures.py

    - name: Run benchmarks
      run: go test ./internal/handlers/... -bench=. -benchmem -benchtime=1s -timeout=600s

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest

  release:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build binaries
      run: |
        GOOS=linux GOARCH=amd64 go build -o thumbnail-forge-linux-amd64 .
        GOOS=darwin GOARCH=amd64 go build -o thumbnail-forge-darwin-amd64 .
        GOOS=darwin GOARCH=arm64 go build -o thumbnail-forge-darwin-arm64 .
        GOOS=windows GOARCH=amd64 go build -o thumbnail-forge-windows-amd64.exe .

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          thumbnail-forge-linux-amd64
          thumbnail-forge-darwin-amd64
          thumbnail-forge-darwin-arm64
          thumbnail-forge-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
